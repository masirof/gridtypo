<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>hand_gridtypo1</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", system-ui, sans-serif;
      background: #363636;
      color: #e6e6e6;
    }
    .wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0;
    }
    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    .stage {
      background: #363636;
      border: 1px solid #5e5e5e;
      border-radius: 0;
      padding: 12px;
      box-shadow: none;
    }
    .wrap > .stage,
    .wrap > .main {
      border: 1px solid #5e5e5e;
    }
    .wrap > .main {
      border-bottom: none;
    }
    .wrap > .stage {
      border-top: 1px solid #5e5e5e;
    }
    .main > .stage {
      border: none;
    }
    .main > .stage + .stage {
      border-left: 1px solid #5e5e5e;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 0;
      background: #363636;
      border: none;
      touch-action: none;
    }
    .status {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 8px;
    }
    .tool-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .tool-button {
      width: 36px;
      height: 36px;
      border: 1px solid #5e5e5e;
      background: #2b2b2b;
      color: #e6e6e6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      border-radius: 0;
    }
    .tool-button.active {
      border-color: #e8481e;
      color: #e8481e;
    }
    .lil-gui {
      --background-color: #363636;
      --text-color: #ffffff;
      --title-background-color: #9f9f9f;
      --title-text-color: #000000;
      --number-color: #e8481e;
      --accent-color: #e8481e;
    }
    pre {
      margin: 0;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    @media (min-width: 960px) {
      .main {
        grid-template-columns: 1.2fr 0.8fr;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="main">
      <div class="stage">
        <div class="status" id="status">Grid Editor</div>
        <svg id="grid"></svg>
      </div>
      <div class="stage">
        <div class="tool-bar" id="tool">
          <button class="tool-button" data-tool="basic" title="Basic Tool">■</button>
          <button class="tool-button" data-tool="addVertex" title="Add Vertex">+</button>
          <button class="tool-button" data-tool="deleteVertex" title="Delete Vertex">×</button>
          <button class="tool-button" data-tool="addEdge" title="Add Edge">━</button>
          <button class="tool-button" data-tool="deleteEdge" title="Delete Edge">╳</button>
          <button class="tool-button" data-tool="addFace" title="Add Face">▦</button>
          <button class="tool-button" data-tool="deleteFace" title="Delete Face">▥</button>
        </div>
        <div id="gui"></div>
      </div>  
    </div>
    <div class="stage">
      <pre id="debug"></pre>
      <pre id="cell_debug"></pre>
    </div>
  </div>

  <script type="module">
  import { initHandGridtypo1 } from "./dist/hand_gridtypo1.js";
  initHandGridtypo1();
</script>
</body>
</html>
